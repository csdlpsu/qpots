version: 2

# Define OS and Python version
build:
  os: ubuntu-24.04
  tools:
    python: "3.10"

# Build documentation using Sphinx
sphinx:
  configuration: docs/source/conf.py

# Install qPOTS and the documentation dependencies from the checked-out source.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
