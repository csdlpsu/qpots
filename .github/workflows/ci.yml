name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,docs]"

      - name: Run tests
        run: python -m pytest -q tests/

  acceptance:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install acceptance dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,docs]" build twine

      - name: Check maintained code and examples
        run: |
          python -m ruff check .
          python -m ruff format --check .
          python -m compileall -q examples

      - name: Build documentation without warnings
        run: python -m sphinx -W -b html docs/source docs/build/html

      - name: Build and validate distributions
        run: |
          python -m build --sdist --wheel
          python -m twine check dist/*
          python tools/verify_distribution.py dist

      - name: Smoke-test the installed wheel
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          cd "${RUNNER_TEMP}"
          python -c "import qpots; assert qpots.__version__; assert qpots.QPOTSRunner"

      - name: Upload acceptance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-artifacts
          path: |
            dist/*
            docs/build/html/
          if-no-files-found: error
          retention-days: 7
